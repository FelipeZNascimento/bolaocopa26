name: ❄️ CI and Deploy to PPROD

on:
  push:

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # - name: Run tests
      #   run: npm run test:run

      - name: Run TypeScript type checking
        run: npm run type-check

      - name: Run ESLint and fix
        run: npm run lint

      - name: 🔨 Build Project (PPROD)
        run: npm run build:pprod

      - name: 📂 Sync files to PPROD folder
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ${{ secrets.server }}
          username: ${{ secrets.username_pprod }}
          password: ${{secrets.password_pprod}}
          port: 22
          uploads: |
            ./dist-pprod/ => ./
